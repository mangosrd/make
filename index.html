<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACRON CONTINENT ID CARD GENERATOR</title>
    <!-- 이미지 저장용 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #0f121d;
            color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            display: flex;
            gap: 40px;
            background: #161b26;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 1100px;
            width: 100%;
            border: 1px solid #2a3447;
        }
        /* 왼쪽 입력 폼 스타일 */
        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .form-section h2 {
            margin-top: 0;
            color: #d4af37; /* 골드 톤 */
            font-size: 22px;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a3447;
            padding-bottom: 10px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input {
            padding: 12px;
            background-color: #0f121d;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            border-color: #d4af37;
            outline: none;
        }
        .btn-save {
            background: linear-gradient(135deg, #c5a028 0%, #9a7b1c 100%);
            color: #0f121d;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            margin-top: 15px;
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.9; }

        /* 오른쪽 카드 프리뷰 영역 */
        .preview-section {
            flex: 1.3;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f121d;
            border-radius: 12px;
            padding: 30px;
            border: 1px dashed #334155;
        }
        
        /* [핵심] image_256681.jpg의 크기와 비율에 맞춘 카드 세팅 */
        .id-card {
            width: 610px;
            height: 410px;
            background-image: url('신분증.png'); /* 원본 이미지 배경 지정 */
            background-size: cover;
            background-position: center;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        /* 사진이 들어갈 영역 좌표 계산 (원본 이미지의 검은 테두리 내부) */
        .photo-area {
            position: absolute;
            left: 45px;
            top: 50px;
            width: 225px;
            height: 310px;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .photo-placeholder {
            color: #555;
            font-size: 14px;
            text-align: center;
        }

        /* 텍스트 요소들을 이미지 선 위에 절대 좌표(Absolute)로 배치 */
        .text-overlay {
            position: absolute;
            left: 485px; /* NAME, AGE 등 라벨의 우측 지점부터 글씨 시작 */
            font-family: 'Georgia', serif;
            font-size: 16px;
            color: #e0cfb3; /* 은은한 골드/아이보리 톤 */
            font-weight: bold;
            letter-spacing: 1px;
            width: 230px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* 각 입력값 항목의 높이(top)를 원본 이미지 가이드 선에 맞춰 정렬 */
        #card-name     { top: 112px; }
        #card-age      { top: 165px; }
        #card-division { top: 220px; }
        #card-ability  { top: 272px; }
        #card-rank     { top: 325px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 왼쪽: 세계관 양식 입력창 -->
    <div class="form-section">
        <h2>ACRON CONTINENT REGISTRATION</h2>
        <div class="form-group">
            <label>AGENT PORTRAIT (사진)</label>
            <input type="file" id="input-photo" accept="image/*">
        </div>
        <div class="form-group">
            <label>NAME (이름)</label>
            <input type="text" id="input-name" placeholder="Character Name" autocomplete="off">
        </div>
        <div class="form-group">
            <label>AGE (나이)</label>
            <input type="text" id="input-age" placeholder="Unknown / 24" autocomplete="off">
        </div>
        <div class="form-group">
            <label>DIVISION (소속)</label>
            <input type="text" id="input-division" placeholder="Special Management Bureau" autocomplete="off">
        </div>
        <div class="form-group">
            <label>ABILITY (능력 / 이능)</label>
            <input type="text" id="input-ability" placeholder="Telekinesis" autocomplete="off">
        </div>
        <div class="form-group">
            <label>RANK (등급)</label>
            <input type="text" id="input-rank" placeholder="S-Class / Senior" autocomplete="off">
        </div>
        <button class="btn-save" id="btn-download">ID CARD 발급 (다운로드)</button>
    </div>

    <!-- 오른쪽: 실시간 매칭 프리뷰 -->
    <div class="preview-section">
        <div class="id-card" id="id-card">
            <!-- 업로드된 사진 영역 -->
            <div class="photo-area">
                <img id="card-photo" src="" style="display: none;">
                <span id="photo-placeholder" class="photo-placeholder"></span>
            </div>
            
            <!-- 각 가이드 라인 위에 얹어질 텍스트들 -->
            <div class="text-overlay" id="card-name"></div>
            <div class="text-overlay" id="card-age"></div>
            <div class="text-overlay" id="card-division"></div>
            <div class="text-overlay" id="card-ability"></div>
            <div class="text-overlay" id="card-rank"></div>
        </div>
    </div>
</div>

<script>
    // 엘리먼트 연결
    const inputs = {
        photo: document.getElementById('input-photo'),
        name: document.getElementById('input-name'),
        age: document.getElementById('input-age'),
        division: document.getElementById('input-division'),
        ability: document.getElementById('input-ability'),
        rank: document.getElementById('input-rank')
    };

    const cards = {
        photo: document.getElementById('card-photo'),
        placeholder: document.getElementById('photo-placeholder'),
        name: document.getElementById('card-name'),
        age: document.getElementById('card-age'),
        division: document.getElementById('card-division'),
        ability: document.getElementById('card-ability'),
        rank: document.getElementById('card-rank')
    };

    // 실시간 텍스트 타이핑 동기화 함수
    function bindInput(inputEl, cardEl) {
        inputEl.addEventListener('input', (e) => {
            cardEl.innerText = e.target.value;
        });
    }

    bindInput(inputs.name, cards.name);
    bindInput(inputs.age, cards.age);
    bindInput(inputs.division, cards.division);
    bindInput(inputs.ability, cards.ability);
    bindInput(inputs.rank, cards.rank);

    // 사진 바인딩
    inputs.photo.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const blobUrl = URL.createObjectURL(file);
            cards.photo.src = blobUrl;
            cards.photo.style.display = 'block';
            cards.placeholder.style.display = 'none';
        }
    });

    // 다운로드 기능 구현
    document.getElementById('btn-download').addEventListener('click', () => {
        const cardElement = document.getElementById('id-card');
        
        // 고화질 다운로드를 위해 scale 설정 보정
        html2canvas(cardElement, { 
            scale: 2,
            useCORS: true // 배경 이미지가 외부 주소일 경우를 대비해 허용 옵션 추가
        }).then(canvas => {
            const link = document.createElement('a');
            const fileName = inputs.name.value ? `${inputs.name.value}_ID_CARD.png` : 'acron_id_card.png';
            link.download = fileName;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    });
</script>

</body>
</html>
