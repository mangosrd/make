<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>운명의 짝 찾기</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #0a0a0a;
            color: #d4af37;
            text-align: center;
            font-family: 'Georgia', serif;
            padding-top: 50px;
        }

        .lever-box {
            font-size: 80px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .lever-box.disabled {
            cursor: not-allowed;
            opacity: 0.3;
        }

        input {
            background: #1a1a1a;
            color: #fff;
            border: 1px solid #d4af37;
            padding: 10px;
            width: 200px;
            text-align: center;
        }

        #result-text {
            font-size: 30px;
            margin-top: 30px;
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>운명의 심판</h1>
    <p>이름을 입력하고 레버를 당겨 운명을 확인하세요.</p>
    <input type="text" id="username" placeholder="이름을 입력하세요">
    <div id="lever" class="lever-box">🎚️</div>
    <div id="result-text">?</div>

    <script>

        const firebaseConfig = {
            apiKey: "AIzaSyAS5Upi4F1YgkH2bnHfw7gyY8bd9oCDMyI",
            authDomain: "acron-d6936.firebaseapp.com",
            databaseURL: "https://acron-d6936-default-rtdb.firebaseio.com",
            projectId: "acron-d6936",
            storageBucket: "acron-d6936.firebasestorage.app",
            messagingSenderId: "360071264065",
            appId: "1:360071264065:web:c20d68e3feee0e6e2053c0"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const lever = document.getElementById('lever');
        const usernameInput = document.getElementById('username');
        const resultText = document.getElementById('result-text');

        lever.addEventListener('click', () => {
            const name = usernameInput.value;
            if (!name) { alert("이름을 입력해주세요!"); return; }

            let selectedNumber = null; // 결과값을 담을 변수

            db.ref('pool').transaction((pool) => {
                if (pool === null) return { 1: 2, 2: 2, 3: 2, 4: 2, 5: 2, 6: 2, 7: 2 };

                let available = [];
                for (let i = 1; i <= 7; i++) if (pool[i] > 0) available.push(i);

                if (available.length === 0) return pool;

                selectedNumber = available[Math.floor(Math.random() * available.length)];
                pool[selectedNumber]--;

                db.ref('history').push({
                    name: name,
                    number: selectedNumber,
                    time: new Date().toLocaleTimeString()
                });

                return pool;
            }, (error, committed) => {
                if (committed && selectedNumber !== null) {
                    lever.classList.add('disabled');
                    lever.style.pointerEvents = 'none';
                    resultText.innerText = `${name}님의 운명은 ${selectedNumber}번입니다.`;
                }
            });
        });
        // ... (위쪽 코드 생략)

// 1. 페이지 로드 시 이미 뽑은 사람인지 확인
const hasDrawn = localStorage.getItem('hasDrawn');
if (hasDrawn === 'true') {
    lever.classList.add('disabled');
    lever.style.pointerEvents = 'none';
    resultText.innerText = "이미 운명을 확인하셨습니다.";
}

lever.addEventListener('click', () => {
    const name = usernameInput.value;
    if (!name) { alert("이름을 입력해주세요!"); return; }

    let selectedNumber = null;

    db.ref('pool').transaction((pool) => {
        if (pool === null) return { 1:2, 2:2, 3:2, 4:2, 5:2, 6:2, 7:2 };
        
        let available = [];
        for(let i=1; i<=7; i++) if(pool[i] > 0) available.push(i);
        
        if (available.length === 0) return pool;
        
        selectedNumber = available[Math.floor(Math.random() * available.length)];
        pool[selectedNumber]--;
        
        db.ref('history').push({
            name: name,
            number: selectedNumber,
            time: new Date().toLocaleTimeString()
        });
        
        return pool;
    }, (error, committed) => {
        if (committed && selectedNumber !== null) {
            // 2. 뽑기 성공 시 브라우저에 저장
            localStorage.setItem('hasDrawn', 'true');
            
            lever.classList.add('disabled');
            lever.style.pointerEvents = 'none';
            resultText.innerText = `${name}님의 운명은 ${selectedNumber}번입니다.`;
        } else if (committed) {
            alert("운명이 모두 결정되었습니다.");
        }
    });
});
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
</body>

</html>
