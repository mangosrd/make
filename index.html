<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>운명의 꽃 뽑기</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        /* 우아하고 깊은 색감의 배경 */
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #231b26 0%, #0d0a0f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', 'Nanum Myeongjo', 'Gowun Batang', serif;
            color: #d4af37; /* 고급스러운 골드 텍스트 */
            overflow: hidden; /* 꽃잎이 화면 밖으로 나가는 것 방지 */
        }

        /* 흩날리는 꽃잎 효과 */
        .petal {
            position: absolute;
            top: -20px;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #9b1b30, #5c0f1c);
            border-radius: 15px 0 15px 0; /* 실제 꽃잎 모양 */
            box-shadow: 0 0 8px rgba(155, 27, 48, 0.5);
            opacity: 0.7;
            pointer-events: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg) translateX(0); }
            50% { transform: translateY(50vh) rotate(180deg) translateX(20px); }
            100% { transform: translateY(100vh) rotate(360deg) translateX(-20px); }
        }

        /* 메인 보드 (유리 질감 느낌의 어두운 카드) */
        .garden-board {
            position: relative;
            z-index: 10;
            background: rgba(20, 15, 20, 0.6);
            backdrop-filter: blur(10px);
            padding: 50px 40px;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.05);
            text-align: center;
            width: 80%;
            max-width: 500px;
        }

        h1 {
            margin-top: 0;
            font-size: 34px;
            font-weight: normal;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        p {
            line-height: 1.8;
            color: #a99a86;
            margin-bottom: 40px;
            font-size: 15px;
        }

        /* 고급스러운 입력 폼 */
        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(212, 175, 55, 0.5);
            padding: 10px;
            width: 60%;
            text-align: center;
            font-size: 18px;
            color: #efdfbb;
            font-family: inherit;
            outline: none;
            transition: 0.3s;
        }

        input::placeholder {
            color: rgba(212, 175, 55, 0.3);
        }

        input:focus {
            border-bottom: 1px solid #d4af37;
            box-shadow: 0 4px 10px -5px rgba(212, 175, 55, 0.4);
        }

        /* 꽃 컨테이너 */
        .garden-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
        }

        /* 꽃 아이콘 스타일링 */
        .flower {
            font-size: 35px;
            cursor: pointer;
            transition: all 0.5s ease;
            user-select: none;
            padding: 15px;
            border-radius: 50%;
            border: 1px solid transparent;
            filter: grayscale(20%);
        }

        .flower:hover {
            transform: scale(1.15) translateY(-5px);
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            filter: grayscale(0%);
        }

        /* 뽑기 완료 후 비활성화 상태 */
        .garden-box.disabled .flower {
            cursor: not-allowed;
            opacity: 0.2;
            filter: grayscale(100%);
            transform: none;
            border: none;
            box-shadow: none;
        }

        /* 결과 텍스트 은은한 빛 */
        .glow {
            animation: elegant-shine 2s infinite alternate;
        }

        @keyframes elegant-shine {
            from { text-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
            to { text-shadow: 0 0 20px rgba(212, 175, 55, 1); }
        }

        #result-text {
            font-size: 20px;
            margin-top: 30px;
            color: #efdfbb;
            min-height: 60px;
        }
    </style>
</head>

<body>
    <div id="petals-container"></div>

    <div class="garden-board">
        <h1>운명의 화원</h1>
        <p>이름을 남기고, 당신을 부르는 꽃을 한 송이 선택하십시오.<br>돌이킬 수 없는 운명의 번호가 새겨집니다.</p>
        <input type="text" id="username" placeholder="이름을 남겨주십시오">
        
        <div id="garden" class="garden-box">
            <div class="flower" title="첫 번째 꽃">🥀</div>
            <div class="flower" title="두 번째 꽃">🌹</div>
            <div class="flower" title="세 번째 꽃">🌸</div>
            <div class="flower" title="네 번째 꽃">💮</div>
            <div class="flower" title="다섯 번째 꽃">🌺</div>
        </div>
        
        <div id="result-text" class="glow"></div>
    </div>

    <script>
        // --- [꽃잎 내리는 효과 스크립트] ---
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            // 랜덤 위치, 크기, 떨어지는 속도 부여
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = Math.random() * 4 + 4 + 's'; // 4초 ~ 8초
            petal.style.opacity = Math.random() * 0.5 + 0.3; // 0.3 ~ 0.8
            petal.style.transform = `scale(${Math.random() * 0.5 + 0.7})`;
            
            document.body.appendChild(petal);
            
            // 애니메이션이 끝나면 DOM에서 제거 (메모리 관리)
            setTimeout(() => {
                petal.remove();
            }, 8000);
        }
        
        // 400ms마다 꽃잎 생성
        setInterval(createPetal, 400);
        // ------------------------------------
      const firebaseConfig = {
            apiKey: "AIzaSyAS5Upi4F1YgkH2bnHfw7gyY8bd9oCDMyI",
            authDomain: "acron-d6936.firebaseapp.com",
            databaseURL: "https://acron-d6936-default-rtdb.firebaseio.com",
            projectId: "acron-d6936",
            storageBucket: "acron-d6936.firebasestorage.app",
            messagingSenderId: "360071264065",
            appId: "1:360071264065:web:c20d68e3feee0e6e2053c0"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const garden = document.getElementById('garden');
        const resultText = document.getElementById('result-text');
        const usernameInput = document.getElementById('username');

        // 꽃밭 안의 어떤 꽃을 클릭하든 동일한 로직이 실행되도록 이벤트 위임
        garden.addEventListener('click', async (e) => {
            // 클릭한 대상이 꽃(.flower)이 아니면 무시
            if (!e.target.classList.contains('flower')) return;

            const name = usernameInput.value.trim();
            if (!name) { alert("이름을 남겨주십시오."); return; }

            // [STEP 1] 서버에서 중복 참여 확인 (기존 로직 동일)
            const snapshot = await db.ref('history').once('value');
            const history = snapshot.val();

            if (history && Object.values(history).some(item => item.name === name)) {
                alert("이미 운명의 꽃을 꺾으셨습니다.");
                garden.classList.add('disabled');
                garden.style.pointerEvents = 'none';
                return;
            }

            // [STEP 2] 번호 뽑기 및 결과 저장 (트랜잭션) - 기존 로직 동일
            db.ref('pool').transaction((pool) => {
                // 초기 데이터가 없을 경우 return으로 끝내지 말고 값을 할당해 줍니다.
                if (pool === null) {
                    pool = { 1: 1, 2: 1, 3: 1, 4: 1};
                }

                let available = [];
                for (let i = 1; i <= 4; i++) {
                    if (pool[i] > 0) available.push(i);
                }

                if (available.length === 0) return pool; // 뽑을 번호가 없을 때

                const choice = available[Math.floor(Math.random() * available.length)];
                pool[choice]--; // 남은 수량 차감
                pool.lastChoice = choice; // 결과 임시 저장

                return pool;
            }, (error, committed, snapshot) => {
                if (error) {
                    console.error("Transaction failed: ", error);
                    return;
                }
                
                if (committed && snapshot && snapshot.val().lastChoice) {
                    const choice = snapshot.val().lastChoice;

                    // [STEP 3] 기록 남기기 (이름, 번호, 시간)
                    db.ref('history').push({ 
                        name: name, 
                        number: choice, 
                        time: new Date().toLocaleTimeString() 
                    });

                    // [STEP 4] UI 잠그기
                    garden.classList.add('disabled');
                    garden.style.pointerEvents = 'none';
                    usernameInput.disabled = true; // 이름 수정 방지
                    
                    // 고급스러운 결과 텍스트 출력
                    resultText.innerHTML = `<span style="color:#d4af37;">${name}</span>님의 운명은<br><br><span style="font-size:45px; font-weight:bold; letter-spacing: 5px;">${choice}</span>번 꽃입니다.`;
                } else {
                    alert("정원의 꽃이 모두 지고 말았습니다.");
                }
            });
        });
    </script>
</body>

</html>
