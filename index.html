<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>운명의 짝 찾기</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: #2b2520;
            /* 양피지 느낌의 어두운 배경 */
            background-image: radial-gradient(circle, #3d342b 1px, transparent 1px);
            background-size: 20px 20px;
            color: #d4af37;
            text-align: center;
            font-family: 'Georgia', serif;
            padding-top: 50px;
        }

        .parchment {
            background: #e6dcc7;
            color: #4a3728;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 10px #c1b391;
            display: inline-block;
            width: 80%;
            max-width: 400px;
            border: 2px solid #b8860b;
        }

        .lever-box {
            font-size: 80px;
            cursor: pointer;
            transition: 0.5s;
            margin: 30px 0;
            filter: drop-shadow(0 0 10px #d4af37);
        }

        .lever-box:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px #ffdf00);
        }

        .lever-box.disabled {
            cursor: not-allowed;
            opacity: 0.3;
            filter: none;
        }

        /* 빛나는 효과 */
        .glow {
            animation: shine 1.5s infinite alternate;
        }

        @keyframes shine {
            from {
                text-shadow: 0 0 5px #fff;
            }

            to {
                text-shadow: 0 0 20px #ffdf00;
            }
        }

        input {
            background: #dcd0b5;
            border: 1px solid #8b4513;
            padding: 10px;
            width: 200px;
            text-align: center;
            font-family: 'Georgia', serif;
            color: #4a3728;
        }

        #result-text {
            font-size: 24px;
            margin-top: 30px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="parchment">
        <h1>운명의 심판</h1>
        <p>이름을 기록하고 레버를 당겨<br>당신의 운명을 마주하십시오.</p>
        <input type="text" id="username" placeholder="이름을 입력하세요">
        <div id="lever" class="lever-box">🎚️</div>
        <div id="result-text" class="glow">?</div>
    </div>

    <script>
        // 1. 초기 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAS5Upi4F1YgkH2bnHfw7gyY8bd9oCDMyI",
            authDomain: "acron-d6936.firebaseapp.com",
            databaseURL: "https://acron-d6936-default-rtdb.firebaseio.com",
            projectId: "acron-d6936",
            storageBucket: "acron-d6936.firebasestorage.app",
            messagingSenderId: "360071264065",
            appId: "1:360071264065:web:c20d68e3feee0e6e2053c0"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const lever = document.getElementById('lever');
        const resultText = document.getElementById('result-text');
        const usernameInput = document.getElementById('username');

        // 2. 레버 클릭 시 동작
        lever.addEventListener('click', async () => {
            const name = usernameInput.value.trim();
            if (!name) { alert("이름을 입력해주세요."); return; }

            // [STEP 1] 서버에서 중복 참여 확인
            const snapshot = await db.ref('history').once('value');
            const history = snapshot.val();

            if (history && Object.values(history).some(item => item.name === name)) {
                alert("이미 참여하신 분입니다.");
                lever.style.pointerEvents = 'none'; // 클릭 방지
                lever.style.opacity = '0.3';
                return;
            }

            // [STEP 2] 번호 뽑기 및 결과 저장 (트랜잭션)
            db.ref('pool').transaction((pool) => {
                if (pool === null) return { 1: 1, 2: 1, 3: 1, 4: 1, 5: 1, 6: 1};

                let available = [];
                for (let i = 1; i <= 6; i++) if (pool[i] > 0) available.push(i);

                if (available.length === 0) return pool; // 뽑을 번호가 없을 때

                const choice = available[Math.floor(Math.random() * available.length)];
                pool[choice]--; // 남은 수량 차감
                pool.lastChoice = choice; // 결과 임시 저장

                return pool;
            }, (error, committed, snapshot) => {
                if (committed && snapshot && snapshot.val().lastChoice) {
                    const choice = snapshot.val().lastChoice;

                    // [STEP 3] 기록 남기기 (이름, 번호, 시간)
                    db.ref('history').push({ name: name, number: choice, time: new Date().toLocaleTimeString() });

                    // [STEP 4] UI 잠그기
                    lever.classList.add('disabled');
                    lever.style.pointerEvents = 'none';
                    resultText.innerHTML = `<span style="color:#b22222;">${name}</span>님의 운명은<br><span style="font-size:50px;">${choice}번</span>입니다.`;
                } else {
                    alert("뽑기에 실패했거나 이미 운명이 모두 결정되었습니다.");
                }
            });
        });
    </script>
</body>

</html>
